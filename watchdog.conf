# Format:
# mode | target | start_command | max_cpu_percent | max_ram_mb | restart_delay_sec
#
# Modes:
# name    - target is a process name checked with: pgrep -x target
# pidfile - target is a file containing one PID, checked through /proc/<pid>
#
# Keep real production commands explicit. The watchdog does not guess how to
# restart a service.
#
# Examples:
# name | nginx | systemctl start nginx | 80 | 256 | 5
# name | mysqld | systemctl start mysql | 90 | 1024 | 10
# pidfile | /run/myapp.pid | /opt/myapp/start.sh | 70 | 512 | 5
#
# Local demo example, run watchdog from the repository root:
pidfile | /tmp/watchdog-memory-leak.pid | PID_FILE=/tmp/watchdog-memory-leak.pid python3 tests/memory_leak.py | 90 | 64 | 3
